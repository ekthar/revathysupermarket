# =============================================================================
# Unified Capacitor Build — Customer, Delivery & Staff Apps
# =============================================================================
# Builds all three app variants (Android APK + AAB, iOS IPA) from the
# Capacitor web shell. Each app points to the same live Vercel URL but
# with different app IDs, permissions, and native configurations.
#
# REQUIRED SECRETS:
#   KEYSTORE_BASE64       - Base64-encoded .jks keystore for signing
#   KEYSTORE_PASSWORD     - Keystore password
#   KEY_ALIAS             - Signing key alias
#   KEY_PASSWORD          - Signing key password
#   GOOGLE_SERVICES_JSON  - Firebase google-services.json (base64)
#
# OPTIONAL SECRETS:
#   PLAY_SERVICE_ACCOUNT_JSON - For auto-upload to Play Console
#
# DISPATCH INPUTS:
#   app:     customer | delivery | staff (which app to build)
#   platform: android | ios | both
#   build_type: debug | release
# =============================================================================

name: Build Capacitor Apps

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to build"
        required: true
        type: choice
        options:
          - customer
          - delivery
          - staff
        default: customer
      platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - android
          - ios
          - both
        default: android
      build_type:
        description: "Build type"
        required: true
        type: choice
        options:
          - debug
          - release
        default: debug

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "21"
  KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Android Build
  # ═══════════════════════════════════════════════════════════════════════════
  build-android:
    name: "Android (${{ inputs.app }} - ${{ inputs.build_type }})"
    runs-on: ubuntu-latest
    if: inputs.platform == 'android' || inputs.platform == 'both'
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: .

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;36.0.0 platforms;android-36"

      - name: Select Capacitor config for app variant
        run: |
          case "${{ inputs.app }}" in
            customer)
              echo "Using capacitor.config.ts (customer)"
              # Already the default — no action needed
              ;;
            delivery)
              echo "Using capacitor.delivery.config.ts"
              cp capacitor.delivery.config.ts capacitor.config.ts
              # Update Android package name for delivery
              sed -i 's/in.revathysupermarket.customer/in.revathysupermarket.delivery/g' android/app/build.gradle
              # Inject delivery-specific permissions into AndroidManifest
              sed -i '/<\/manifest>/d' android/app/src/main/AndroidManifest.xml
              grep '<uses-permission' android/app/src/main/AndroidManifest.delivery.xml >> android/app/src/main/AndroidManifest.xml
              echo '</manifest>' >> android/app/src/main/AndroidManifest.xml
              ;;
            staff)
              echo "Using capacitor.staff.config.ts"
              cp capacitor.staff.config.ts capacitor.config.ts
              # Update Android package name for staff
              sed -i 's/in.revathysupermarket.customer/in.revathysupermarket.staff/g' android/app/build.gradle
              # Inject staff-specific permissions into AndroidManifest
              sed -i '/<\/manifest>/d' android/app/src/main/AndroidManifest.xml
              grep '<uses-permission' android/app/src/main/AndroidManifest.staff.xml >> android/app/src/main/AndroidManifest.xml
              echo '</manifest>' >> android/app/src/main/AndroidManifest.xml
              ;;
          esac

      - name: Decode google-services.json
        if: env.GOOGLE_SERVICES_JSON != ''
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Sync Capacitor Android
        run: npx cap sync android
        env:
          CAPACITOR_SERVER_URL: ${{ vars.CAPACITOR_SERVER_URL || 'https://revathysupermarket.vercel.app' }}

      - name: Decode Keystore
        if: inputs.build_type == 'release' && env.KEYSTORE_BASE64 != ''
        id: keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/keystore.jks
          echo "KEYSTORE_FILE=${{ github.workspace }}/keystore.jks" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        if: inputs.build_type == 'debug'
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Build Release APK + AAB
        if: inputs.build_type == 'release' && env.KEYSTORE_BASE64 != ''
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" \
            -PKEYSTORE_FILE=${{ steps.keystore.outputs.KEYSTORE_FILE }} \
            -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: Upload Debug APK
        if: inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.app }}-debug-apk"
          path: apps/web/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: inputs.build_type == 'release' && env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.app }}-release-apk"
          path: apps/web/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB
        if: inputs.build_type == 'release' && env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.app }}-release-aab"
          path: apps/web/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # iOS Build
  # ═══════════════════════════════════════════════════════════════════════════
  build-ios:
    name: "iOS (${{ inputs.app }} - ${{ inputs.build_type }})"
    runs-on: macos-latest
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: .

      - name: Select Capacitor config for app variant
        run: |
          case "${{ inputs.app }}" in
            customer)
              echo "Using capacitor.config.ts (customer)"
              ;;
            delivery)
              cp capacitor.delivery.config.ts capacitor.config.ts
              ;;
            staff)
              cp capacitor.staff.config.ts capacitor.config.ts
              ;;
          esac

      - name: Sync Capacitor iOS
        run: npx cap sync ios
        env:
          CAPACITOR_SERVER_URL: ${{ vars.CAPACITOR_SERVER_URL || 'https://revathysupermarket.vercel.app' }}

      - name: Install CocoaPods
        run: pod install
        working-directory: apps/web/ios/App

      - name: Build iOS Archive
        run: |
          cd ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS Archive
        uses: actions/upload-artifact@v4
        with:
          name: "${{ inputs.app }}-ios-archive"
          path: apps/web/ios/App/build/App.xcarchive
          retention-days: 30
