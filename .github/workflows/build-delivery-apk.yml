name: Build Delivery APK

on:
  push:
    branches: [main]
    paths:
      - "apps/web/capacitor.config.ts"
      - "apps/web/android/**"
      - "apps/web/package.json"
      - ".github/workflows/build-delivery-apk.yml"
  workflow_dispatch:

env:
  KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: .

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;36.0.0 platforms;android-36"

      - name: Sync Capacitor Android
        run: npx cap sync android
        env:
          CAPACITOR_SERVER_URL: ${{ vars.CAPACITOR_SERVER_URL || 'https://revathysupermarket.com' }}

      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        id: keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/keystore.jks
          echo "KEYSTORE_FILE=${{ github.workspace }}/keystore.jks" >> $GITHUB_OUTPUT

      - name: Build Debug APK (auto-signed, installable)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Build Release APK + AAB (signed)
        if: env.KEYSTORE_BASE64 != ''
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" \
            -PKEYSTORE_FILE=${{ steps.keystore.outputs.KEYSTORE_FILE }} \
            -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: Upload Debug APK (installable on any device)
        uses: actions/upload-artifact@v4
        with:
          name: delivery-debug-apk
          path: apps/web/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: delivery-release-apk
          path: apps/web/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: delivery-release-aab
          path: apps/web/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
