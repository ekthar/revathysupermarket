name: Build Delivery IPA

on:
  push:
    branches: [main]
    paths:
      - "apps/web/capacitor.config.ts"
      - "apps/web/ios/**"
      - "apps/web/package.json"
      - ".github/workflows/build-delivery-ipa.yml"
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: .

      - name: Sync Capacitor iOS
        run: npx cap sync ios
        env:
          CAPACITOR_SERVER_URL: ${{ vars.CAPACITOR_SERVER_URL || 'https://revathysupermarket.com' }}

      - name: Install CocoaPods
        run: pod install
        working-directory: apps/web/ios/App

      - name: Build iOS Archive
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/App \
            -exportOptionsPlist exportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: delivery-release-ipa
          path: apps/web/build/App/*.ipa
          retention-days: 30
