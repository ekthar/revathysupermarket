name: Build Staff APK (Local)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile-staff

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > google-services.json

      - name: Expo prebuild (generate android project)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://revathysupermarket.vercel.app/api/mobile/v1' }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile-staff/android/.gradle
          key: gradle-${{ hashFiles('apps/mobile-staff/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('apps/mobile-staff/android/app/build.gradle') }}
          restore-keys: gradle-

      - name: Build Debug APK
        if: inputs.build_type == 'debug'
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Build Release APK
        if: inputs.build_type == 'release'
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: msm-staff-${{ inputs.build_type }}-apk
          path: |
            apps/mobile-staff/android/app/build/outputs/apk/debug/*.apk
            apps/mobile-staff/android/app/build/outputs/apk/release/*.apk
          retention-days: 14
