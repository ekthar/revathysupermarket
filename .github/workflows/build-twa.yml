name: Build TWA APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/twa/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;34.0.0 platforms;android-34'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/twa/**/*.gradle.kts', 'apps/twa/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: apps/twa

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: apps/twa

      - name: Build Release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          export KEYSTORE_FILE=$(pwd)/keystore.jks
          ./gradlew assembleRelease
        working-directory: apps/twa

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: twa-debug-apk
          path: apps/twa/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        with:
          name: twa-release-apk
          path: apps/twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
