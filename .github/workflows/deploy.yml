# =============================================================================
# Auto-Deploy to Production
# =============================================================================
# This workflow deploys the app to the DigitalOcean droplet when code is pushed
# to the main branch.
#
# REQUIRED SECRETS (set in GitHub repo Settings > Secrets and variables > Actions):
#
#   SERVER_IP        - The public IP address of your DigitalOcean droplet
#   SSH_PRIVATE_KEY  - Private SSH key for the deploy user
#
# HOW TO SET UP SSH KEY:
#
#   1. Generate a key pair (on your local machine):
#      ssh-keygen -t ed25519 -C "github-actions-deploy" -f deploy_key
#
#   2. Add the PUBLIC key to the server:
#      ssh deploy@YOUR_SERVER_IP
#      echo "PASTE_PUBLIC_KEY_HERE" >> ~/.ssh/authorized_keys
#
#   3. Add the PRIVATE key as a GitHub secret:
#      - Go to your repo on GitHub
#      - Settings > Secrets and variables > Actions > New repository secret
#      - Name: SSH_PRIVATE_KEY
#      - Value: paste the entire content of deploy_key (the private key file)
#
#   4. Add the server IP as a secret:
#      - Name: SERVER_IP
#      - Value: your droplet's public IP address
#
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/deploy/revathysupermarket
            git pull origin main
            cd apps/web
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            NODE_OPTIONS="--max-old-space-size=3072" npm run build
            pm2 restart revathy
            echo "Deployed at $(date)"
