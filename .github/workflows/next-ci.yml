name: Next.js CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: msm_supermarket
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/msm_supermarket
      NEXTAUTH_SECRET: ci-only-secret-with-at-least-thirty-two-characters
      AUTH_SECRET: ci-only-secret-with-at-least-thirty-two-characters
      NEXTAUTH_URL: http://127.0.0.1:3000
      AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      UPSTASH_REDIS_REST_URL: https://example.invalid
      UPSTASH_REDIS_REST_TOKEN: ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:ui
        env:
          CI: "true"
