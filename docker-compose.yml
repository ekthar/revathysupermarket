services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: msm
      POSTGRES_PASSWORD: msm_password
      POSTGRES_DB: msm_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msm -d msm_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "
        npm install --prefer-offline --no-audit --no-fund &&
        cd apps/web &&
        npx prisma generate &&
        npx prisma migrate deploy &&
        exec npm run dev
      "
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://msm:msm_password@postgres:5432/msm_dev
      DIRECT_DATABASE_URL: postgresql://msm:msm_password@postgres:5432/msm_dev
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
