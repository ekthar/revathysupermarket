name: msm_mobile
description: "MSM Supermarket - Mobile App for customers and delivery partners."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Code Generation (annotations)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Icons
  cupertino_icons: ^1.0.8

  # Local Storage
  shared_preferences: ^2.3.3

  # Connectivity
  connectivity_plus: ^6.1.4

  # Push Notifications & Firebase
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1

  # Alarm Audio
  audioplayers: ^6.1.0

  # Location
  geolocator: ^13.0.2

  # Permissions
  permission_handler: ^11.3.1

  # UI Enhancements
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code Generation
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
